<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta AVJ COMMUNITY</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            color: #fca311;
            margin-bottom: 5px;
            text-align: center;
        }

        /* PANTALLA 1: FACTURA */
        #pantalla-factura {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #14213d;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            text-align: center;
        }

        #pantalla-factura p {
            color: #a8dadc;
            margin-bottom: 20px;
        }

        /* PANTALLA 2: RULETA (Oculta al inicio) */
        #pantalla-ruleta {
            display: none; 
            flex-direction: column;
            align-items: center;
        }

        /* PANTALLA 3: YA JUGÓ (Bloqueo total) */
        #pantalla-final {
            display: none;
            flex-direction: column;
            align-items: center;
            background-color: #14213d;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            text-align: center;
        }

        #premio-texto {
            font-size: 24px;
            font-weight: bold;
            color: #a8dadc;
            margin-top: 20px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .controls {
            margin-bottom: 20px;
            text-align: center;
            margin-top: 10px;
        }

        input {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            outline: none;
            margin-bottom: 15px;
            text-align: center;
            width: 250px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #fca311;
            color: #14213d;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            width: 100%;
            max-width: 250px;
        }

        button:hover {
            background-color: #e5980b;
        }

        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin-top: 10px;
        }

        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #e63946;
            z-index: 10;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        #result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #a8dadc;
            text-align: center;
            min-height: 30px;
        }
    </style>
</head>
<body>

    <!-- PANTALLA 1: FACTURA -->
    <div id="pantalla-factura">
        <h1>AVJ COMMUNITY</h1>
        <p>Introduce tu número de factura para acceder a la ruleta</p>
        <!-- Placeholder corregido con una factura falsa -->
        <input type="text" id="input-factura" placeholder="Ej: 00001234x-z0000" autocomplete="off">
        <button onclick="verificarFactura()">VERIFICAR</button>
    </div>

    <!-- PANTALLA 2: RULETA -->
    <div id="pantalla-ruleta">
        <h1>AVJ COMMUNITY</h1>
        <p>Introduce tu código para girar</p>

        <div class="controls" id="caja-controles">
            <input type="text" id="codigo" placeholder="Ingresa tu código..." autocomplete="off">
            <button onclick="girarRuleta()">GIRAR</button>
        </div>

        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheel" width="300" height="300"></canvas>
        </div>

        <div id="result"></div>
    </div>

    <!-- PANTALLA 3: BLOQUEO POST-GIRO -->
    <div id="pantalla-final">
        <h1>AVJ COMMUNITY</h1>
        <div id="premio-texto"></div>
        <button onclick="resetearParaNuevaFactura()">INGRESAR NUEVA FACTURA</button>
    </div>

    <script>
        // --- 1. SISTEMA DE FACTURAS Y BLOQUEO ---
        const listaFacturas = [
            "00001704h-ñ0270", "00001705a-x1829", "00001706b-z3491", 
            "00001707c-y5520", "00001708d-w7714", "00001709e-v9102", 
            "00001710f-u2384", "00001711g-t4657", "00001712i-s6930", 
            "00001713j-r8145", "00001714k-q0256", "00001715l-p1948", 
            "00001716m-o3762", "00001717n-m5893", "00001718p-l8021"
        ];
        
        let facturasValidas = JSON.parse(localStorage.getItem("memoriaFacturasAVJ")) || listaFacturas;

        // VERIFICACIÓN AL CARGAR LA PÁGINA
        window.onload = function() {
            const yaGiro = localStorage.getItem("yaGiroAVJ");
            const premioGuardado = localStorage.getItem("premioAVJ");

            if (yaGiro === "true") {
                // Si ya jugó alguna vez, se bloquea todo y solo ve su resultado
                document.getElementById("pantalla-factura").style.display = "none";
                document.getElementById("pantalla-ruleta").style.display = "none";
                document.getElementById("pantalla-final").style.display = "flex";
                document.getElementById("premio-texto").innerHTML = `Ya utilizaste tu giro.<br>Tu premio fue: $${premioGuardado}<br><br>🎉 AVJ COMMUNITY 🎉`;
            } else if (localStorage.getItem("accesoPermitidoAVJ") === "true") {
                // Si puso factura pero no ha girado
                document.getElementById("pantalla-factura").style.display = "none";
                document.getElementById("pantalla-ruleta").style.display = "flex";
                dibujarRuleta();
            }
        };

        function verificarFactura() {
            const inputFac = document.getElementById("input-factura").value.trim().toLowerCase(); 
            
            if (facturasValidas.includes(inputFac)) {
                // Quemar factura
                facturasValidas = facturasValidas.filter(f => f !== inputFac);
                localStorage.setItem("memoriaFacturasAVJ", JSON.stringify(facturasValidas));
                
                // Dar acceso
                localStorage.setItem("accesoPermitidoAVJ", "true");
                
                document.getElementById("pantalla-factura").style.display = "none";
                document.getElementById("pantalla-ruleta").style.display = "flex";
                
                // Restablecer interfaz de ruleta por si viene de un reset
                document.getElementById("caja-controles").style.display = "block";
                document.getElementById("result").innerText = "";
                
                dibujarRuleta();
            } else {
                alert("Factura inválida, incorrecta o ya utilizada.");
            }
        }

        // FUNCIÓN PARA RESETEAR Y PERMITIR NUEVA COMPRA
        function resetearParaNuevaFactura() {
            // Borramos los candados de seguridad de la memoria
            localStorage.removeItem("yaGiroAVJ");
            localStorage.removeItem("accesoPermitidoAVJ");
            localStorage.removeItem("premioAVJ");

            // Ocultamos la pantalla final y regresamos a la pantalla de factura
            document.getElementById("pantalla-final").style.display = "none";
            document.getElementById("pantalla-factura").style.display = "flex";
            document.getElementById("input-factura").value = ""; // Limpiar el input
        }

        // --- 2. SISTEMA DE RULETA Y CÓDIGOS ---
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const resultText = document.getElementById("result");
        
        const numSecciones = 20;
        const premios = Array.from({length: numSecciones}, (_, i) => i + 1);
        const colores = ["#e63946", "#f1faee", "#a8dadc", "#457b9d", "#1d3557"];
        
        const listaMax5 = [
            "AVJ47X", "AVJ92B", "AVJ15M", "AVJ83K", "AVJ61P", 
            "AVJ29R", "AVJ54T", "AVJ76Y", "AVJ38W", "AVJ05L"
        ];

        const listaValidos = [
            "AVJ200", "AVJ0B", "AVJ&09", "AVJ551",
            "AVJ928", "AVJ704", "AVJ891", "AVJ741", "AVJ582", "AVJ193", "AVJ604", "AVJ837", "AVJ259", "AVJ470",
            "AVJ916", "AVJ358", "AVJ821", "AVJ503", "AVJ769", "AVJ142", "AVJ985", "AVJ374", "AVJ610", "AVJ297",
            "AVJ846", "AVJ519", "AVJ730", "AVJ482", "AVJ951", "AVJ263", "AVJ708", "AVJ154", "AVJ893", "AVJ427",
            "AVJ631", "AVJ905", "AVJ386", "AVJ714", "AVJ529", "AVJ180", "AVJ647", "AVJ972", "AVJ305", "AVJ816",
            "AVJ493", "AVJ250", "AVJ781", "AVJ639", "AVJ108", "AVJ574", "AVJ920", "AVJ361", "AVJ849", "AVJ215",
            "AVJ796", "AVJ403", "AVJ581", "AVJ934", "AVJ167", "AVJ805", "AVJ279", "AVJ541", "AVJ390", "AVJ628",
            "AVJ753", "AVJ416", "AVJ850", "AVJ192", "AVJ675", "AVJ308", "AVJ941", "AVJ526", "AVJ870", "AVJ239",
            "AVJ461", "AVJ718", "AVJ594", "AVJ103", "AVJ862", "AVJ350", "AVJ976", "AVJ281", "AVJ649", "AVJ517",
            "AVJ430", "AVJ895", "AVJ724", "AVJ168", "AVJ903", "AVJ547", "AVJ219", "AVJ680", "AVJ375", "AVJ842",
            "AVJ159", "AVJ736", "AVJ958", "AVJ402", "AVJ613", "AVJ825", "AVJ397", "AVJ506", "AVJ784", "AVJ248"
        ];
        
        let codigosMax5 = JSON.parse(localStorage.getItem("memoriaAVJMax5")) || listaMax5;
        let codigosValidos = JSON.parse(localStorage.getItem("memoriaAVJValidos")) || listaValidos;

        let rotacionActual = 0;
        let girando = false;

        function dibujarRuleta() {
            const arco = (2 * Math.PI) / numSecciones;
            for (let i = 0; i < numSecciones; i++) {
                const angulo = i * arco;
                ctx.beginPath();
                ctx.fillStyle = colores[i % colores.length];
                ctx.moveTo(150, 150);
                ctx.arc(150, 150, 150, angulo, angulo + arco);
                ctx.lineTo(150, 150);
                ctx.fill();
                
                ctx.save();
                ctx.translate(150, 150);
                ctx.rotate(angulo + arco / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = (ctx.fillStyle === "#f1faee") ? "#1d3557" : "#fff";
                ctx.font = "bold 14px Arial";
                ctx.fillText("$" + premios[i], 135, 5);
                ctx.restore();
            }
        }

        function girarRuleta() {
            if (girando) return;
            
            const inputCodigo = document.getElementById("codigo").value.trim();
            let premioIndex;

            if (codigosValidos.includes(inputCodigo)) {
                premioIndex = 0; 
                codigosValidos = codigosValidos.filter(c => c !== inputCodigo);
                localStorage.setItem("memoriaAVJValidos", JSON.stringify(codigosValidos));

            } else if (codigosMax5.includes(inputCodigo)) {
                premioIndex = Math.floor(Math.random() * 5); 
                codigosMax5 = codigosMax5.filter(c => c !== inputCodigo);
                localStorage.setItem("memoriaAVJMax5", JSON.stringify(codigosMax5));

            } else {
                alert("Código inválido o ya utilizado. Asegúrate de respetar las mayúsculas.");
                return;
            }

            // BLOQUEO INMEDIATO EN MEMORIA
            localStorage.setItem("yaGiroAVJ", "true");
            localStorage.setItem("premioAVJ", premios[premioIndex]);

            // Desaparecemos los controles
            document.getElementById("caja-controles").style.display = "none";

            girando = true;
            resultText.innerText = "Girando...";

            const arcoGrados = 360 / numSecciones;
            const premioRotacion = 360 - (premioIndex * arcoGrados) - (arcoGrados / 2) - 90;
            const rotacionFinal = rotacionActual + 1800 + (premioRotacion - (rotacionActual % 360));
            
            canvas.style.transform = `rotate(${rotacionFinal}deg)`;
            rotacionActual = rotacionFinal;

            setTimeout(() => {
                girando = false;
                resultText.innerHTML = `¡Felicidades! Ganaste $${premios[premioIndex]}<br>🎉 AVJ COMMUNITY 🎉`;
                
                // Mostrar botón de recarga después de ganar
                setTimeout(() => {
                    document.getElementById("pantalla-ruleta").style.display = "none";
                    document.getElementById("pantalla-final").style.display = "flex";
                    document.getElementById("premio-texto").innerHTML = `Ya utilizaste tu giro.<br>Tu premio fue: $${premios[premioIndex]}<br><br>🎉 AVJ COMMUNITY 🎉`;
                }, 3000); // Espera 3 segundos para que vean la ruleta detenida antes de bloquear la pantalla
                
            }, 4000);
        }
    </script>
</body>
</html>
