<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta AVJ COMMUNITY</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            color: #fca311;
            margin-bottom: 5px;
            text-align: center;
        }

        /* CONTENEDORES DE PANTALLA */
        .pantalla {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #14213d;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;
        }

        #pantalla-ruleta, #pantalla-final {
            display: none; 
        }

        p {
            color: #a8dadc;
            margin-bottom: 20px;
            font-size: 15px;
        }

        /* FORMULARIOS Y BOTONES */
        input[type="text"] {
            padding: 12px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            outline: none;
            margin-bottom: 15px;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
            text-transform: uppercase; /* Ayuda visual al usuario */
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            background-color: #fca311;
            color: #14213d;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s, transform 0.1s;
            width: 100%;
            margin-bottom: 10px;
        }

        button:hover {
            background-color: #e5980b;
        }
        
        button:active {
            transform: scale(0.98);
        }

        .btn-whatsapp {
            background-color: #25D366;
            color: white;
        }
        .btn-whatsapp:hover {
            background-color: #1ebe57;
        }

        /* CHECKBOX TÉRMINOS */
        .checkbox-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #a8dadc;
            text-align: left;
        }
        .checkbox-container input {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        /* RULETA Y PUNTERO */
        .wheel-container {
            position: relative;
            width: 100%;
            max-width: 300px;
            aspect-ratio: 1 / 1;
            margin-top: 10px;
        }

        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #e63946;
            z-index: 10;
            transition: transform 0.1s;
        }

        /* Animación del puntero al girar */
        .pointer.ticking {
            animation: tick 0.15s infinite alternate;
        }

        @keyframes tick {
            0% { transform: translateX(-50%) rotate(0deg); }
            100% { transform: translateX(-50%) rotate(-15deg); }
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        #result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            color: #a8dadc;
            text-align: center;
            min-height: 30px;
        }

        #premio-texto {
            font-size: 24px;
            font-weight: bold;
            color: #a8dadc;
            margin-top: 10px;
            margin-bottom: 25px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="pantalla-factura" class="pantalla">
        <h1>AVJ COMMUNITY</h1>
        <p>Introduce tu número de factura para acceder a la ruleta</p>
        <input type="text" id="input-factura" placeholder="Ej: 00001704H-Ñ0270" autocomplete="off">
        
        <div class="checkbox-container">
            <input type="checkbox" id="terminos">
            <label for="terminos">Acepto los términos y reglas del sorteo.</label>
        </div>

        <button onclick="verificarFactura()">VERIFICAR FACTURA</button>
    </div>

    <div id="pantalla-ruleta" class="pantalla">
        <h1>AVJ COMMUNITY</h1>
        <p>Introduce tu código para girar</p>

        <div id="caja-controles" style="width: 100%;">
            <input type="text" id="codigo" placeholder="INGRESA TU CÓDIGO..." autocomplete="off">
            <button onclick="girarRuleta()">GIRAR RULETA</button>
        </div>

        <div class="wheel-container">
            <div class="pointer" id="puntero"></div>
            <canvas id="wheel" width="300" height="300"></canvas>
        </div>

        <div id="result"></div>
    </div>

    <div id="pantalla-final" class="pantalla">
        <h1>AVJ COMMUNITY</h1>
        <div id="premio-texto"></div>
        <button class="btn-whatsapp" onclick="compartirWhatsApp()">COMPARTIR EN WHATSAPP</button>
        <button onclick="resetearParaNuevaFactura()">INGRESAR NUEVA FACTURA</button>
    </div>

    <script>
        // --- SISTEMA DE SONIDOS (Web Audio API para no depender de archivos externos) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTick() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.05);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); // Volumen bajito
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function playWin() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1);
            osc.frequency.setValueAtTime(1000, audioCtx.currentTime + 0.2);
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); // Volumen victoria
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            osc.start();
            osc.stop(audioCtx.currentTime + 1);
        }

        // --- 1. SISTEMA DE FACTURAS Y BLOQUEO ---
        const listaFacturas = [
            "00001704H-Ñ0270", "00001705A-X1829", "00001706B-Z3491", 
            "00001707C-Y5520", "00001708D-W7714", "00001709E-V9102", 
            "00001710F-U2384", "00001711G-T4657", "00001712I-S6930", 
            "00001713J-R8145", "00001714K-Q0256", "00001715L-P1948", 
            "00001716M-O3762", "00001717N-M5893", "00001718P-L8021"
        ];
        
        let facturasValidas = JSON.parse(localStorage.getItem("memoriaFacturasAVJ")) || listaFacturas;

        // VERIFICACIÓN AL CARGAR LA PÁGINA
        window.onload = function() {
            const yaGiro = localStorage.getItem("yaGiroAVJ");
            const premioGuardado = localStorage.getItem("premioAVJ");

            if (yaGiro === "true") {
                document.getElementById("pantalla-factura").style.display = "none";
                document.getElementById("pantalla-final").style.display = "flex";
                document.getElementById("premio-texto").innerHTML = `Ya utilizaste tu giro.<br><br>Tu premio fue:<br>🎉 $${premioGuardado} 🎉`;
            } else if (localStorage.getItem("accesoPermitidoAVJ") === "true") {
                document.getElementById("pantalla-factura").style.display = "none";
                document.getElementById("pantalla-ruleta").style.display = "flex";
                dibujarRuleta();
            }
        };

        function verificarFactura() {
            const inputFac = document.getElementById("input-factura").value.trim().toUpperCase(); 
            const aceptoTerminos = document.getElementById("terminos").checked;

            if (!aceptoTerminos) {
                alert("Debes aceptar los términos y reglas del sorteo para participar.");
                return;
            }
            
            if (facturasValidas.includes(inputFac)) {
                // Quemar factura
                facturasValidas = facturasValidas.filter(f => f !== inputFac);
                localStorage.setItem("memoriaFacturasAVJ", JSON.stringify(facturasValidas));
                localStorage.setItem("accesoPermitidoAVJ", "true");
                
                document.getElementById("pantalla-factura").style.display = "none";
                document.getElementById("pantalla-ruleta").style.display = "flex";
                document.getElementById("caja-controles").style.display = "block";
                document.getElementById("result").innerText = "";
                
                // Habilitar audio context con la primera interacción del usuario
                if(audioCtx.state === 'suspended') audioCtx.resume();
                
                dibujarRuleta();
            } else {
                alert("Factura inválida, incorrecta o ya utilizada.");
            }
        }

        function resetearParaNuevaFactura() {
            localStorage.removeItem("yaGiroAVJ");
            localStorage.removeItem("accesoPermitidoAVJ");
            localStorage.removeItem("premioAVJ");

            document.getElementById("pantalla-final").style.display = "none";
            document.getElementById("pantalla-factura").style.display = "flex";
            document.getElementById("input-factura").value = ""; 
            document.getElementById("terminos").checked = false;
        }

        // --- 2. SISTEMA DE RULETA Y CÓDIGOS ---
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const resultText = document.getElementById("result");
        const puntero = document.getElementById("puntero");
        
        const numSecciones = 20;
        const premios = Array.from({length: numSecciones}, (_, i) => i + 1);
        const colores = ["#e63946", "#f1faee", "#a8dadc", "#457b9d", "#1d3557"];
        
        const listaMax5 = [
            "AVJ47X", "AVJ92B", "AVJ15M", "AVJ83K", "AVJ61P", 
            "AVJ29R", "AVJ54T", "AVJ76Y", "AVJ38W", "AVJ05L"
        ];

        // Códigos principales que SIEMPRE caerán en 1 (Indice 0)
        const listaValidos = [
            "AVJ200", "AVJ0B", "AVJ&09", "AVJ551",
            "AVJ928", "AVJ704", "AVJ891", "AVJ741", "AVJ582", "AVJ193", "AVJ604", "AVJ837", "AVJ259", "AVJ470",
            "AVJ916", "AVJ358", "AVJ821", "AVJ503", "AVJ769", "AVJ142", "AVJ985", "AVJ374", "AVJ610", "AVJ297"
        ];
        
        let codigosMax5 = JSON.parse(localStorage.getItem("memoriaAVJMax5")) || listaMax5;
        let codigosValidos = JSON.parse(localStorage.getItem("memoriaAVJValidos")) || listaValidos;

        let rotacionActual = 0;
        let girando = false;

        function dibujarRuleta() {
            const arco = (2 * Math.PI) / numSecciones;
            for (let i = 0; i < numSecciones; i++) {
                const angulo = i * arco;
                ctx.beginPath();
                ctx.fillStyle = colores[i % colores.length];
                ctx.moveTo(150, 150);
                ctx.arc(150, 150, 150, angulo, angulo + arco);
                ctx.lineTo(150, 150);
                ctx.fill();
                
                ctx.save();
                ctx.translate(150, 150);
                ctx.rotate(angulo + arco / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = (ctx.fillStyle === "#f1faee") ? "#1d3557" : "#fff";
                ctx.font = "bold 14px Arial";
                ctx.fillText("$" + premios[i], 135, 5);
                ctx.restore();
            }
        }

        function girarRuleta() {
            if (girando) return;
            
            // CONVERSIÓN A MAYÚSCULAS PARA EVITAR TRAMPAS DE REUTILIZACIÓN
            const inputCodigo = document.getElementById("codigo").value.trim().toUpperCase();
            let premioIndex;

            if (codigosValidos.includes(inputCodigo)) {
                premioIndex = 0; // Fuerzas que caiga siempre en el premio de índice 0 ($1)
                codigosValidos = codigosValidos.filter(c => c !== inputCodigo);
                localStorage.setItem("memoriaAVJValidos", JSON.stringify(codigosValidos));

            } else if (codigosMax5.includes(inputCodigo)) {
                premioIndex = Math.floor(Math.random() * 5); 
                codigosMax5 = codigosMax5.filter(c => c !== inputCodigo);
                localStorage.setItem("memoriaAVJMax5", JSON.stringify(codigosMax5));

            } else {
                alert("Código inválido o ya utilizado.");
                return;
            }

            // BLOQUEO INMEDIATO
            localStorage.setItem("yaGiroAVJ", "true");
            localStorage.setItem("premioAVJ", premios[premioIndex]);

            document.getElementById("caja-controles").style.display = "none";
            girando = true;
            resultText.innerText = "Girando...";

            // Animación y Sonido
            puntero.classList.add("ticking");
            let tickInterval = setInterval(playTick, 150);

            const arcoGrados = 360 / numSecciones;
            const premioRotacion = 360 - (premioIndex * arcoGrados) - (arcoGrados / 2) - 90;
            const rotacionFinal = rotacionActual + 1800 + (premioRotacion - (rotacionActual % 360));
            
            canvas.style.transform = `rotate(${rotacionFinal}deg)`;
            rotacionActual = rotacionFinal;

            setTimeout(() => {
                girando = false;
                puntero.classList.remove("ticking");
                clearInterval(tickInterval);
                playWin(); // Sonido de victoria
                
                // Lluvia de confeti
                confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.6 }
                });

                resultText.innerHTML = `¡Felicidades! Ganaste $${premios[premioIndex]}`;
                
                // Redirección a pantalla final
                setTimeout(() => {
                    document.getElementById("pantalla-ruleta").style.display = "none";
                    document.getElementById("pantalla-final").style.display = "flex";
                    document.getElementById("premio-texto").innerHTML = `Ya utilizaste tu giro.<br><br>Tu premio fue:<br>🎉 $${premios[premioIndex]} 🎉`;
                }, 3500); 
                
            }, 4000); // 4 segundos dura el CSS transition
        }

        function compartirWhatsApp() {
            const premioGanado = localStorage.getItem("premioAVJ");
            const mensaje = encodeURIComponent(`¡Acabo de ganar $${premioGanado} en la ruleta de AVJ COMMUNITY! 🚀`);
            window.open(`https://wa.me/?text=${mensaje}`, "_blank");
        }
    </script>
</body>
</html>
